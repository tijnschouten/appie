site_name: python-appie
site_description: Unofficial async Python client for the Albert Heijn API
site_url: https://tijnschouten.github.io/appie/
repo_url: https://github.com/tijnschouten/appie
repo_name: python-appie

theme:
  name: material
  features:
    - navigation.sections
    - content.code.copy

plugins:
  - search
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: nl
          name: Nederlands
          build: true
          nav_translations:
            Home: Home
            Getting Started: Snelstart
            Authentication: Authenticatie
            Products: Producten
            Receipts: Bonnen
            Shopping Lists: Boodschappenlijsten
            Mock Client: Mockclient
            Project History: Projectgeschiedenis
            CLI: CLI
            Development: Ontwikkeling

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.superfences
  - pymdownx.inlinehilite

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Authentication: authentication.md
  - Products: products.md
  - Receipts: receipts.md
  - Shopping Lists: lists.md
  - Mock Client: mock-client.md
  - Project History: history.md
  - CLI: cli.md
  - Development: development.md
